services:
  front:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-https://service.andromeda.andrescortes.dev}
        VITE_MEDIA_BASE_URL: ${VITE_MEDIA_BASE_URL:-https://admin.andromeda.andrescortes.dev/storage}
    container_name: virtual-store-front
    restart: unless-stopped
    ports:
      - "${FRONT_PORT:-5173}:80"
